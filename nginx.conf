worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # 구 ASP.NET 페이지 → 새 홈페이지 리다이렉트
        location ~* \.(aspx|asp|ashx|asmx)$ { return 301 /; }

        # API: Node.js 서버로 프록시
        location /api/ {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # HTML: 항상 최신 버전
        location ~* \.(html)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # 정적 자산: 1년 캐시
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── 하위 페이지 단계적 차단 (410 Gone) ──────────────────────────────
        # 아래 항목을 하나씩 주석 해제 → 배포 → 모니터링 → 문제없으면 파일 삭제
        #
        # [정책 백업]
        # location ~ ^/mobile/policy_backup/         { return 410; }
        #
        # [걸프렌드 앱 정책]
        # location ~ ^/mobile/girlfriend/            { return 410; }
        #
        # [드림100 카페 정책]
        # location = /mobile/policy/dream100krcafe.htm { return 410; }
        #
        # [구버전 개인정보처리방침 2017-10-13]
        # location = /mobile/policy/privacy_171013.htm  { return 410; }
        # location = /mobile/policy/gos_privacy_171013.htm { return 410; }
        #
        # [구버전 약관/방침 2023-03-27]
        # location = /mobile/policy/policy_230327.htm   { return 410; }
        # location = /mobile/policy/privacy_230327.htm  { return 410; }
        #
        # [운영정책]
        # location = /mobile/policy/operation.htm       { return 410; }
        # location = /mobile/policy/operation_en.htm    { return 410; }
        #
        # [영문 약관]
        # location = /mobile/policy/policy_en.htm       { return 410; }
        # location = /mobile/policy/privacy_en.htm      { return 410; }
        #
        # [청소년 보호정책]
        # location = /mobile/policy/youth.htm           { return 410; }
        #
        # [GOS 개인정보처리방침]
        # location = /mobile/policy/gos_privacy.htm     { return 410; }
        #
        # [드래곤라자 성명서 이미지]
        # location = /img/dr_notice.jpg                 { return 410; }
        #
        # [드래곤라자 성명서 페이지]
        # location = /dr/dr_notice.html                 { return 410; }
        #
        # [구글 서치콘솔 인증 파일]
        # location = /google8c957f18c8efd94e.html       { return 410; }
        # location = /googleb46fa7cfb1fdbd56.html       { return 410; }
        # location = /googlefffcdb5c09873bf4.html       { return 410; }
        # ─────────────────────────────────────────────────────────────────

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
