<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POLICY_TITLE — SESISOFT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8faff;
      --surface: #ffffff;
      --border: #dde5f7;
      --accent: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --nav-h: 64px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a { text-decoration: none; color: inherit; }

    /* ── Top Nav ── */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .top-nav-left { display: flex; align-items: center; gap: 16px; }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 600; color: var(--muted);
      padding: 8px 16px; border-radius: 8px;
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(37,99,235,.05); }
    .back-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-divider { width: 1px; height: 20px; background: var(--border); }
    .page-title-nav { font-size: 15px; font-weight: 700; color: var(--text); }
    .nav-logo-small img { height: 36px; width: auto; mix-blend-mode: multiply; }

    /* ── Layout ── */
    .page-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 56px) 48px 80px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 64px;
    }

    /* ── Sidebar TOC ── */
    .toc {
      position: sticky;
      top: calc(var(--nav-h) + 32px);
      align-self: start;
    }
    .toc-label {
      font-size: 11px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px;
    }
    .toc ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .toc a {
      display: block;
      font-size: 13.5px; color: var(--muted);
      padding: 7px 12px; border-radius: 8px;
      border-left: 2px solid transparent;
      transition: all .2s;
    }
    .toc a:hover { color: var(--accent); background: rgba(37,99,235,.06); }
    .toc a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(37,99,235,.07); font-weight: 600; }

    /* ── Main Content ── */
    .content-area {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 56px 60px;
      box-shadow: 0 4px 24px rgba(37,99,235,.06);
    }
    .content-header { margin-bottom: 48px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
    .content-header h1 { font-size: 32px; font-weight: 900; letter-spacing: -.02em; margin-bottom: 10px; }
    .content-header .effective-date { font-size: 14px; color: var(--muted); }

    .content-section { margin-bottom: 48px; scroll-margin-top: calc(var(--nav-h) + 24px); }
    .content-section h2 {
      font-size: 18px; font-weight: 800;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .content-section p { font-size: 14.5px; line-height: 2; color: #334155; margin-bottom: 12px; }
    .content-section ul { padding-left: 20px; margin-bottom: 12px; }
    .content-section ul li { font-size: 14.5px; line-height: 2; color: #334155; margin-bottom: 4px; }
    .content-section ol { padding-left: 20px; margin-bottom: 12px; }
    .content-section ol li { font-size: 14.5px; line-height: 2; color: #334155; margin-bottom: 4px; }
    .content-section strong { color: var(--text); font-weight: 700; }

    .highlight-box {
      background: rgba(37,99,235,.05);
      border: 1px solid rgba(37,99,235,.15);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
      font-size: 14px; line-height: 1.9; color: #1e3a8a;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      padding: 32px 48px 48px;
      font-size: 13px; color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }

    @media (max-width: 768px) {
      .top-nav { padding: 0 20px; }
      .page-wrapper { grid-template-columns: 1fr; padding: calc(var(--nav-h) + 32px) 20px 60px; gap: 32px; }
      .toc { position: static; }
      .content-area { padding: 32px 24px; }
      .content-header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <div class="top-nav-left">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      홈으로
    </a>
    <div class="nav-divider"></div>
    <span class="page-title-nav">POLICY_TITLE</span>
  </div>
  <a href="index.html" class="nav-logo-small">
    <img src="logo.png" alt="SESISOFT">
  </a>
</nav>

<div class="page-wrapper">
  <!-- Sidebar TOC -->
  <aside class="toc">
    <div class="toc-label">목차</div>
    <ul id="tocList"></ul>
  </aside>

  <!-- Content -->
  <main class="content-area">
    <div class="content-header">
      <h1>POLICY_TITLE</h1>
      <p class="effective-date">시행일: EFFECTIVE_DATE</p>
    </div>

    <!-- SECTIONS GO HERE -->

  </main>
</div>

<div class="page-footer">
  © 2024 SESISOFT Corp. All rights reserved.
</div>

<script>
  // Auto-build TOC from h2 headings
  const sections = document.querySelectorAll('.content-section');
  const tocList = document.getElementById('tocList');
  sections.forEach((sec, i) => {
    const h2 = sec.querySelector('h2');
    if (!h2) return;
    const id = 'sec-' + i;
    sec.id = id;
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h2.textContent;
    li.appendChild(a);
    tocList.appendChild(li);
  });

  // Active TOC highlight on scroll
  const tocLinks = tocList.querySelectorAll('a');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        tocLinks.forEach(a => a.classList.remove('active'));
        const activeLink = tocList.querySelector('a[href="#' + entry.target.id + '"]');
        if (activeLink) activeLink.classList.add('active');
      }
    });
  }, { rootMargin: '-64px 0px -60% 0px' });
  sections.forEach(sec => observer.observe(sec));
</script>
</body>
</html>
